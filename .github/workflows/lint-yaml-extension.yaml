name: Enforce .yaml Extension

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-yaml-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for disallowed .yml files
        run: |
          allowed=(
            .pullapprove.yml
          )

          mapfile -t found < <(git ls-files '*.yml')

          failed=0
          for file in "${found[@]}"; do
            allowed_file=false
            for a in "${allowed[@]}"; do
              if [[ "$file" == "$a" ]]; then
                allowed_file=true
                break
              fi
            done
            if [[ "$allowed_file" == false ]]; then
              echo "::error file=$file::Use the .yaml extension instead of .yml (file: $file)"
              failed=1
            fi
          done

          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "Found .yml files that are not in the allowlist."
            echo "Please rename them to use the .yaml extension."
            echo "If a tool requires .yml, add the file to the allowlist in .github/workflows/lint-yaml-extension.yaml"
            exit 1
          fi

          echo "All YAML files use the correct .yaml extension."
