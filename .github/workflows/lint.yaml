name: Verify linter

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
          check-latest: false

      - name: Configure pnpm
        uses: pnpm/action-setup@v4

      - name: Lint
        run: pnpm run lint
