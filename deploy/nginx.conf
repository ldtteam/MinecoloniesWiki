worker_processes 1;

events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name minecolonies.com;

    root /app/dist/client;
    index index.html index.htm;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    error_page 404 /404.html;

    # 1. Serve static assets directly
    location /assets/ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # 2. Serve prerendered static pages
    location / {
      try_files $uri $uri.html @astro;
    }

    # 3. Fallback to Astro SSR (Node)
    location @astro {
      proxy_pass http://127.0.0.1:4321;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  server {
    listen 80;
    server_name minecolonies.ldtteam.com;

    rewrite ^/(.*)$ https://minecolonies.com/$1 permanent;
  }

  server {
    listen 80;
    server_name wiki.minecolonies.com;

    location /source {
      rewrite ^/source(.*)$ https://minecolonies.com/wiki$1 permanent;
    }

    location / {
      rewrite ^/(.*)$ https://minecolonies.com/wiki/$1 permanent;
    }
  }

  server {
    listen 80;
    server_name wiki.minecolonies.ldtteam.com;

    location /source {
      rewrite ^/source(.*)$ https://minecolonies.com/wiki$1 permanent;
    }

    location / {
      rewrite ^/(.*)$ https://minecolonies.com/wiki/$1 permanent;
    }
  }
}