name: Research
path: <namespace>/researches/<branch>/<research-id>.json
fields:
  - key: name
    type: primitive
    primitive:
      - string
    description: The displayed name of the research, presented to the user. May be a translation key.
    example: Outposts
    default: com.<namespace>.research.<path>.name
  - key: subtitle
    type: primitive
    primitive:
      - string
    description: A subtitle for the research, displayed on mouse over. May be a translation key.
    example: Unlock the ability to settle outposts
    optional: true
  - key: branch
    type: primitive
    primitive:
      - resourcelocation
    description: A Resource Location that indicates which branch the research belongs in.
    example: minecolonies:civilian
  - key: parentResearch
    type: primitive
    primitive:
      - resourcelocation
    description: The Resource Location for a parent research, which must be completed before this research may be unlocked. Required for research of a level greater than 1. Must be on the same branch.
    example: minecolonies:civilian/outposts
    optional: true
  - key: researchLevel
    type: primitive
    primitive:
      - integer
    description: 'The Research Level of the research. Unless the branch is set to `"branch-type": "unlockables"`, requires a :building{name="university"} of equal or greater level to begin researches of levels 1 through 5, and only allows one level 6 research to be completed at a time. If above level 1, must have a valid parent one level lower.'
    example: 3
    default: 1
  - key: sortOrder
    type: primitive
    primitive:
      - integer
    description: Controls the vertical position of the branch on the Research Tree GUI. Lowers numbers are placed higher up, while higer numbers are placed closer to the bottom. Only applies to research with siblings.
    example: 2
    default: 0
  - key: exclusiveChildResearch
    type: primitive
    primitive:
      - boolean
    description: If true and the research has more than one descendant research, allows completion of only one of those researches at a time.
    example: false
    default: false
  - key: no-reset
    type: primitive
    primitive:
      - boolean
    description: If true, prevents undoing the research. Has no effect if the research is already unresettable.
    example: false
    default: false
  - key: hidden
    type: primitive
    primitive:
      - boolean
    description: If true, does not display the research until its requirements are fulfilled. Has no effect if the research has no requirements or only has item costs.
    example: false
    default: false
  - key: autostart
    type: primitive
    primitive:
      - boolean
    description: If true, and the research has no item costs, begins the research automatically once its requirements are fulfilled. If the research has item costs, notifies logged-in players that it is available to begin.
    example: false
    default: false
  - key: instant
    type: primitive
    primitive:
      - boolean
    description: If true, attempts to instantly (or within 30 seconds) complete the research after it has been begun.
    example: false
    default: false
  - key: requirements
    type: array
    description: An array of requirements for the research before it may be researched.
    optional: true
    children:
      - key: type
        type: union
        description: |-
          The type of requirement, see the options below for the kind of requirements that exist.

          **Note:** Custom requirements can be made available because requirements are a registry. Custom requirements will not be listed here.
        example: minecolonies:building
        variants:
          - value: minecolonies:building
            description: The requirement type for a building where one or multiple buildings can create a total of levels. For example 1 building of level 3, 1 building of level 4, will equate to a total of 7 levels.
            children:
              - key: building
                type: primitive
                primitive:
                  - resourcelocation
                description: The resource location of the building to refer to.
                example: minecolonies:builder
              - key: level
                type: primitive
                primitive:
                  - integer
                description: The target level all buildings should total.
                example: 5
          - value: minecolonies:single-building
            description: The requirement type for a building where a single building must reach the given level.
            children:
              - key: building
                type: primitive
                primitive:
                  - resourcelocation
                description: The resource location of the building to refer to.
                example: minecolonies:builder
              - key: level
                type: primitive
                primitive:
                  - integer
                description: |-
                  The target level a single building should be.

                  **Note:** This should never be more than 5, because a building can never level up past level 5.
                example: 5
          - value: minecolonies:alternate-building
            description: The requirement type for a building where one of several buildings can be matched against the level requirement. This works similar as `minecolonies:building`. However the total levels must not be shared between buildings.
            children:
              - key: alternate-buildings
                type: array_primitive
                primitive:
                  - resourcelocation
                description: The array of buildings to refer to.
                example:
                  - minecolonies:guardtower
                  - minecolonies:barracks
                  - minecolonies:barracktower
                  - minecolonies:gatehouse
              - key: level
                type: primitive
                primitive:
                  - integer
                description: The target level all buildings should total.
                example: 5
          - value: minecolonies:research
            description: |-
              The requirement type for requiring a different research elsewhere down the research tree.

              **Note:** There is no protection against a research being out of the tree somewhere. So make sure the research can actually happen before the current research.
            children:
              - key: research
                type: primitive
                primitive:
                  - resourcelocation
                description: The research id to refer to.
                example: minecolonies:citizen/outposts
  - key: costs
    type: array
    description: Contains all the item costs for the research. All items must be provided by the player so that a research may be started. All cost items are "Ingredients", see https://docs.neoforged.net/docs/resources/server/recipes/ingredients/ for more information about ingredients.
    optional: true
    children:
      - key: item
        type: primitive
        primitive:
          - resourcelocation
        description: The item id to refer to. Either this or `tag` has to be provided.
        example: minecraft:stone
        optional: true
      - key: tag
        type: primitive
        primitive:
          - resourcelocation
        description: The tag to refer to. Either this or `item` has to be provided.
        example: c:ores
        optional: true
      - key: count
        type: primitive
        primitive:
          - integer
        description: How many of said `item` or `tag` to need.
        example: 2
        default: 1
  - key: effects
    type: array
    description: Contains all of the effects of the research. Can be empty, either for research with no effects or for research that only unlocks crafterrecipes, or contain one or more objects.
    optional: true
    children:
      - key: id
        type: primitive
        primitive:
          - resourcelocation
        description: The research effect identifier as a Resource Location.
        example: minecolonies:effects/regenerationmultiplier
      - key: level
        type: primitive
        primitive:
          - integer
        description: The strength of the research effect. If the level exceeds the maximum level of the effect, it defaults to the maximum level.
        example: 3
        default: 1
  - key: remove
    type: primitive
    primitive:
      - string
      - boolean
    description: |-
      Removes a research branch, and all research on that branch, regardless of the source. May cause data loss if applied to an existing world.
       - String: Removes any research matching the Resource Location in that String.
       - Boolean (true): Removes research matching the Resource Location of the JSON itself; this form is discouraged for cases where other data packs may apply, as it may be conflicted by those other data packs.
    example: true
    optional: true
